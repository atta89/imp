openapi: 3.0.3
info:
  title: imp — Multi-Venue Inventory Management Platform
  version: 0.1.0
  description: |
    Source of truth for every endpoint and every data shape in the imp backend.
    See docs/prd.md for product context. Generated Go models live in
    internal/models/models.gen.go — DO NOT hand-edit; change this file and run
    `make generate`.

servers:
  - url: http://localhost:8080/api/v1
    description: local dev

tags:
  - name: auth
  - name: venues
  - name: categories
  - name: departments
  - name: users
  - name: assets
  - name: scan
  - name: purchase-orders
  - name: repairs
  - name: reports
  - name: notifications

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    PageParam:
      name: page
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    LimitParam:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 200, default: 25 }
    IdPath:
      name: id
      in: path
      required: true
      schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' }
    QrTokenPath:
      name: qrToken
      in: path
      required: true
      schema: { type: string }

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  schemas:

    # ============================================================
    # Helper types
    # ============================================================

    # ObjectId — a MongoDB ObjectID. Generated as `type ObjectId = bson.ObjectID`
    # so the same struct serializes correctly for both API JSON and Mongo BSON.
    #
    # IMPORTANT: oapi-codegen drops vendor extensions when they sit as siblings
    # of `$ref`. Whenever you need x-go-name or x-oapi-codegen-extra-tags on a
    # property whose type is ObjectId (or any other $ref'd schema), wrap it as:
    #   foo:
    #     allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
    #     x-go-name: Foo
    #     x-oapi-codegen-extra-tags: { bson: "foo,omitempty" }
    ObjectId:
      type: string
      pattern: '^[0-9a-fA-F]{24}$'
      x-go-type: bson.ObjectID
      x-go-type-import:
        path: go.mongodb.org/mongo-driver/v2/bson

    Pagination:
      type: object
      required: [page, limit, total, totalPages]
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer, format: int64 }
        totalPages: { type: integer }

    Meta:
      type: object
      properties:
        pagination: { $ref: '#/components/schemas/Pagination' }

    ErrorPayload:
      type: object
      required: [kind, message]
      properties:
        kind:
          type: string
          enum: [bad_request, unauthorized, forbidden, not_found, conflict, validation, internal, http_error]
        message: { type: string }
        fields:
          type: object
          additionalProperties: { type: string }

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error: { $ref: '#/components/schemas/ErrorPayload' }

    # ============================================================
    # Attachment schemas
    # ============================================================

    Attachment:
      type: object
      description: Internal attachment record (not returned in full to any API caller).
      required: [id, filename, contentType, size, uploadedBy, linked, createdAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        filename:
          type: string
          x-oapi-codegen-extra-tags: { bson: "filename" }
        contentType:
          type: string
          x-oapi-codegen-extra-tags: { bson: "contentType" }
        size:
          type: integer
          format: int64
          x-oapi-codegen-extra-tags: { bson: "size" }
        storageKey:
          type: string
          x-oapi-codegen-extra-tags: { bson: "storageKey" }
        uploadedBy:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-oapi-codegen-extra-tags: { bson: "uploadedBy" }
        linked:
          type: boolean
          x-oapi-codegen-extra-tags: { bson: "linked" }
        assetIds:
          type: array
          x-go-name: AssetIDs
          x-oapi-codegen-extra-tags: { bson: "assetIds,omitempty" }
          items:
            allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
        movementIds:
          type: array
          x-go-name: MovementIDs
          x-oapi-codegen-extra-tags: { bson: "movementIds,omitempty" }
          items:
            allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
        createdAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "createdAt" }
        linkedAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "linkedAt,omitempty" }

    AttachmentMeta:
      type: object
      description: Public attachment metadata embedded in history responses.
      required: [id, filename, contentType, size]
      properties:
        id: { $ref: '#/components/schemas/ObjectId' }
        filename: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }

    AttachmentUploadResponse:
      type: object
      required: [attachmentId, filename, contentType, size]
      properties:
        attachmentId: { $ref: '#/components/schemas/ObjectId' }
        filename: { type: string }
        contentType: { type: string }
        size: { type: integer, format: int64 }

    AttachmentValidationError:
      type: object
      required: [attachmentId, ok]
      properties:
        attachmentId: { $ref: '#/components/schemas/ObjectId' }
        ok: { type: boolean }
        error:
          type: string
          enum: [not_found, not_owner, already_linked]

    AttachmentValidationResponse:
      type: object
      description: |
        Returned as the 400 body when action-time attachment validation fails.
        The top-level 'attachments' array is only present for Phase-B failures
        (per-attachment checks). Phase-A gate failures (too_many, duplicate_id)
        return only the 'error' payload.
      required: [error]
      properties:
        error:
          $ref: '#/components/schemas/ErrorPayload'
        attachments:
          type: array
          items: { $ref: '#/components/schemas/AttachmentValidationError' }

    # ============================================================
    # Enums
    # ============================================================

    Role:
      type: string
      enum: [admin, venue_manager, staff]

    AssetStatus:
      type: string
      enum: [available, in_use, in_repair, retired, lost]

    AssetCondition:
      type: string
      enum: [new, good, fair, poor]

    MovementType:
      type: string
      enum: [transfer, status_change, custody_change, condition_change, repair_in, repair_out]

    RepairStatus:
      type: string
      enum: [open, in_progress, completed, unrepairable]

    PurchaseOrderStatus:
      type: string
      enum: [draft, ordered, received, cancelled]

    NotificationType:
      type: string
      enum: [overdue, custody_change, transfer, repair_update]

    NotificationStatus:
      type: string
      enum: [queued, sent, failed]

    NotificationChannel:
      type: string
      enum: [email]

    CustomFieldType:
      type: string
      enum: [string, number, boolean, date]

    # ============================================================
    # Collection: User
    # ============================================================

    User:
      type: object
      required: [id, name, email, passwordHash, role, position, venueIds, notifyByEmail, isActive, createdAt, updatedAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        name:
          type: string
          x-oapi-codegen-extra-tags: { bson: "name" }
        email:
          type: string
          format: email
          x-oapi-codegen-extra-tags: { bson: "email" }
        passwordHash:
          type: string
          x-go-name: PasswordHash
          x-oapi-codegen-extra-tags: { bson: "passwordHash", json: "-" }
        role:
          allOf: [ { $ref: '#/components/schemas/Role' } ]
          x-oapi-codegen-extra-tags: { bson: "role" }
        position:
          type: string
          description: 'Job title, e.g. "IT Staff", "Event Manager"'
          x-oapi-codegen-extra-tags: { bson: "position" }
        venueIds:
          type: array
          x-go-name: VenueIDs
          x-oapi-codegen-extra-tags: { bson: "venueIds" }
          items:
            allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
        notifyByEmail:
          type: boolean
          x-oapi-codegen-extra-tags: { bson: "notifyByEmail" }
        phone:
          type: string
          x-oapi-codegen-extra-tags: { bson: "phone,omitempty" }
        isActive:
          type: boolean
          x-oapi-codegen-extra-tags: { bson: "isActive" }
        createdAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "createdAt" }
        updatedAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "updatedAt" }

    ScanUserContact:
      description: >-
        Responsible person shown on the authenticated scan view. Every viewer
        is authenticated AND authorized for the asset, so full contact details
        (email/phone) are included.
      type: object
      required: [id, name, role, position, email]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
        name: { type: string }
        role: { $ref: '#/components/schemas/Role' }
        position: { type: string }
        email: { type: string, format: email }
        phone: { type: string }

    # ============================================================
    # Collection: Venue
    # ============================================================

    Venue:
      type: object
      required: [id, name, code, type, isActive, createdAt, updatedAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        name: { type: string, x-oapi-codegen-extra-tags: { bson: "name" } }
        code: { type: string, x-oapi-codegen-extra-tags: { bson: "code" } }
        address: { type: string, x-oapi-codegen-extra-tags: { bson: "address,omitempty" } }
        city: { type: string, x-oapi-codegen-extra-tags: { bson: "city,omitempty" } }
        type: { type: string, x-oapi-codegen-extra-tags: { bson: "type" } }
        isActive: { type: boolean, x-oapi-codegen-extra-tags: { bson: "isActive" } }
        createdAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "createdAt" } }
        updatedAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "updatedAt" } }

    # ============================================================
    # Collection: Category
    # ============================================================

    CategoryCustomField:
      type: object
      required: [key, label, type, required]
      properties:
        key: { type: string, x-oapi-codegen-extra-tags: { bson: "key" } }
        label: { type: string, x-oapi-codegen-extra-tags: { bson: "label" } }
        type:
          allOf: [ { $ref: '#/components/schemas/CustomFieldType' } ]
          x-oapi-codegen-extra-tags: { bson: "type" }
        required: { type: boolean, x-oapi-codegen-extra-tags: { bson: "required" } }

    Category:
      type: object
      required: [id, name, slug, customFields, isActive, createdAt, updatedAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        name: { type: string, x-oapi-codegen-extra-tags: { bson: "name" } }
        slug: { type: string, x-oapi-codegen-extra-tags: { bson: "slug" } }
        description: { type: string, x-oapi-codegen-extra-tags: { bson: "description,omitempty" } }
        customFields:
          type: array
          x-oapi-codegen-extra-tags: { bson: "customFields" }
          items: { $ref: '#/components/schemas/CategoryCustomField' }
        isActive: { type: boolean, x-oapi-codegen-extra-tags: { bson: "isActive" } }
        createdAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "createdAt" } }
        updatedAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "updatedAt" } }

    # ============================================================
    # Collection: Department
    # ============================================================

    Department:
      type: object
      required: [id, venueId, name, code, isActive, createdAt, updatedAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        venueId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: VenueID
          x-oapi-codegen-extra-tags: { bson: "venueId" }
        name: { type: string, x-oapi-codegen-extra-tags: { bson: "name" } }
        code: { type: string, x-oapi-codegen-extra-tags: { bson: "code" } }
        description: { type: string, x-oapi-codegen-extra-tags: { bson: "description,omitempty" } }
        isActive: { type: boolean, x-oapi-codegen-extra-tags: { bson: "isActive" } }
        createdAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "createdAt" } }
        updatedAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "updatedAt" } }

    # ============================================================
    # Collection: Asset
    # ============================================================

    Asset:
      type: object
      required:
        - id
        - assetTag
        - qrToken
        - name
        - categoryId
        - homeVenueId
        - currentVenueId
        - status
        - condition
        - isOverdue
        - isActive
        - createdAt
        - updatedAt
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        assetTag: { type: string, x-oapi-codegen-extra-tags: { bson: "assetTag" } }
        qrToken: { type: string, x-oapi-codegen-extra-tags: { bson: "qrToken" } }
        name: { type: string, x-oapi-codegen-extra-tags: { bson: "name" } }
        categoryId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: CategoryID
          x-oapi-codegen-extra-tags: { bson: "categoryId" }
        homeVenueId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: HomeVenueID
          x-oapi-codegen-extra-tags: { bson: "homeVenueId" }
        currentVenueId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: CurrentVenueID
          x-oapi-codegen-extra-tags: { bson: "currentVenueId" }
        departmentId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: DepartmentID
          x-oapi-codegen-extra-tags: { bson: "departmentId,omitempty" }
        status:
          allOf: [ { $ref: '#/components/schemas/AssetStatus' } ]
          x-oapi-codegen-extra-tags: { bson: "status" }
        condition:
          allOf: [ { $ref: '#/components/schemas/AssetCondition' } ]
          x-oapi-codegen-extra-tags: { bson: "condition" }
        responsibleUserId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ResponsibleUserID
          x-oapi-codegen-extra-tags: { bson: "responsibleUserId,omitempty" }
        purchaseOrderId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: PurchaseOrderID
          x-oapi-codegen-extra-tags: { bson: "purchaseOrderId,omitempty" }
        purchaseDate: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "purchaseDate,omitempty" } }
        serialNumber: { type: string, x-oapi-codegen-extra-tags: { bson: "serialNumber,omitempty" } }
        specs:
          type: object
          description: Free-form map of category-defined custom fields.
          additionalProperties: true
          x-oapi-codegen-extra-tags: { bson: "specs,omitempty" }
        photos:
          type: array
          x-oapi-codegen-extra-tags: { bson: "photos,omitempty" }
          items: { type: string }
        expectedReturnDate: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "expectedReturnDate,omitempty" } }
        isOverdue: { type: boolean, x-oapi-codegen-extra-tags: { bson: "isOverdue" } }
        notes: { type: string, x-oapi-codegen-extra-tags: { bson: "notes,omitempty" } }
        isActive: { type: boolean, x-oapi-codegen-extra-tags: { bson: "isActive" } }
        importJobId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ImportJobID
          x-oapi-codegen-extra-tags: { bson: "importJobId,omitempty" }
        createdAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "createdAt" } }
        updatedAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "updatedAt" } }

    ScanAssetView:
      description: >-
        Read-only asset view returned by the authenticated scan endpoint. Carries
        no attachment data — attachment metadata is exclusive to
        GET /assets/{id}/history.
      type: object
      required: [asset]
      properties:
        asset: { $ref: '#/components/schemas/Asset' }
        responsiblePerson: { $ref: '#/components/schemas/ScanUserContact' }
        homeVenueName: { type: string }
        currentVenueName: { type: string }
        categoryName: { type: string }
        departmentName: { type: string }

    # ============================================================
    # Collection: PurchaseOrder
    # ============================================================

    PurchaseOrderSupplier:
      type: object
      required: [name]
      properties:
        name: { type: string, x-oapi-codegen-extra-tags: { bson: "name" } }
        contact: { type: string, x-oapi-codegen-extra-tags: { bson: "contact,omitempty" } }

    PurchaseOrderLineItem:
      type: object
      required: [categoryId, name, quantity]
      properties:
        categoryId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: CategoryID
          x-oapi-codegen-extra-tags: { bson: "categoryId" }
        name: { type: string, x-oapi-codegen-extra-tags: { bson: "name" } }
        quantity: { type: integer, minimum: 1, x-oapi-codegen-extra-tags: { bson: "quantity" } }

    PurchaseOrder:
      type: object
      required: [id, poNumber, supplier, responsibleUserId, orderDate, status, lineItems, createdBy, createdAt, updatedAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        poNumber:
          type: string
          x-go-name: PONumber
          x-oapi-codegen-extra-tags: { bson: "poNumber" }
        supplier:
          allOf: [ { $ref: '#/components/schemas/PurchaseOrderSupplier' } ]
          x-oapi-codegen-extra-tags: { bson: "supplier" }
        responsibleUserId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ResponsibleUserID
          x-oapi-codegen-extra-tags: { bson: "responsibleUserId" }
        orderDate: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "orderDate" } }
        receivedDate: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "receivedDate,omitempty" } }
        status:
          allOf: [ { $ref: '#/components/schemas/PurchaseOrderStatus' } ]
          x-oapi-codegen-extra-tags: { bson: "status" }
        lineItems:
          type: array
          x-oapi-codegen-extra-tags: { bson: "lineItems" }
          items: { $ref: '#/components/schemas/PurchaseOrderLineItem' }
        attachments:
          type: array
          x-oapi-codegen-extra-tags: { bson: "attachments,omitempty" }
          items: { type: string }
        notes: { type: string, x-oapi-codegen-extra-tags: { bson: "notes,omitempty" } }
        createdBy:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-oapi-codegen-extra-tags: { bson: "createdBy" }
        importJobId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ImportJobID
          x-oapi-codegen-extra-tags: { bson: "importJobId,omitempty" }
        createdAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "createdAt" } }
        updatedAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "updatedAt" } }

    # ============================================================
    # Collection: Movement (audit trail per asset)
    # ============================================================

    Movement:
      type: object
      required: [id, assetId, type, performedBy, performedAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        assetId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: AssetID
          x-oapi-codegen-extra-tags: { bson: "assetId" }
        type:
          allOf: [ { $ref: '#/components/schemas/MovementType' } ]
          x-oapi-codegen-extra-tags: { bson: "type" }
        fromVenueId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: FromVenueID
          x-oapi-codegen-extra-tags: { bson: "fromVenueId,omitempty" }
        toVenueId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ToVenueID
          x-oapi-codegen-extra-tags: { bson: "toVenueId,omitempty" }
        fromStatus:
          allOf: [ { $ref: '#/components/schemas/AssetStatus' } ]
          x-oapi-codegen-extra-tags: { bson: "fromStatus,omitempty" }
        toStatus:
          allOf: [ { $ref: '#/components/schemas/AssetStatus' } ]
          x-oapi-codegen-extra-tags: { bson: "toStatus,omitempty" }
        fromCondition:
          allOf: [ { $ref: '#/components/schemas/AssetCondition' } ]
          x-oapi-codegen-extra-tags: { bson: "fromCondition,omitempty" }
        toCondition:
          allOf: [ { $ref: '#/components/schemas/AssetCondition' } ]
          x-oapi-codegen-extra-tags: { bson: "toCondition,omitempty" }
        fromUserId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: FromUserID
          x-oapi-codegen-extra-tags: { bson: "fromUserId,omitempty" }
        toUserId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ToUserID
          x-oapi-codegen-extra-tags: { bson: "toUserId,omitempty" }
        reason: { type: string, x-oapi-codegen-extra-tags: { bson: "reason,omitempty" } }
        notes: { type: string, x-oapi-codegen-extra-tags: { bson: "notes,omitempty" } }
        attachmentIds:
          type: array
          x-go-name: AttachmentIDs
          x-oapi-codegen-extra-tags: { bson: "attachmentIds,omitempty" }
          items: { $ref: '#/components/schemas/ObjectId' }
        attachments:
          type: array
          description: Populated only in history responses via server-side enrichment; never persisted.
          x-oapi-codegen-extra-tags: { bson: "-" }
          items: { $ref: '#/components/schemas/AttachmentMeta' }
        expectedReturnDate: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "expectedReturnDate,omitempty" } }
        performedBy:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-oapi-codegen-extra-tags: { bson: "performedBy" }
        performedAt: { type: string, format: date-time, x-oapi-codegen-extra-tags: { bson: "performedAt" } }

    # ============================================================
    # Collection: Repair
    # ============================================================

    Repair:
      type: object
      required: [id, assetId, issue, reportedBy, reportedAt, status, createdAt, updatedAt]
      properties:
        id:
