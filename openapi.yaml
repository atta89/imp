          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "completedAt,omitempty" }

    ImportPreviewPO:
      type: object
      required: [poNumber, lineItems, assetCount]
      properties:
        poNumber:   { type: string }
        lineItems:  { type: integer }
        assetCount: { type: integer }
        categories:
          type: array
          items: { type: string }
        venues:
          type: array
          items: { type: string }
        skipExisting: { type: boolean }

    ImportPreview:
      type: object
      required: [job, posPreview]
      properties:
        job: { $ref: '#/components/schemas/ImportJob' }
        posPreview:
          type: array
          items: { $ref: '#/components/schemas/ImportPreviewPO' }

    CommitImportRequest:
      type: object
      required: [importJobId]
      properties:
        importJobId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ImportJobID
        options:
          allOf: [ { $ref: '#/components/schemas/ImportJobOptions' } ]

security:
  - bearerAuth: []

paths:
  # ---- Auth ----
  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Email/password login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /auth/refresh:
    post:
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /auth/me:
    get:
      tags: [auth]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Venues ----
  /venues:
    get:
      tags: [venues]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Venue' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [venues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVenueRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Venue' }

  /venues/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [venues]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Venue' }
    put:
      tags: [venues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVenueRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Venue' }
    delete:
      tags: [venues]
      responses:
        '204': { description: deleted }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Categories ----
  /categories:
    get:
      tags: [categories]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCategoryRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }

  /categories/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [categories]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }
    put:
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCategoryRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }
    delete:
      tags: [categories]
      responses:
        '204': { description: deleted }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Departments (nested under venues) ----
  /venues/{venueId}/departments:
    parameters:
      - name: venueId
        in: path
        required: true
        schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' }
    get:
      tags: [departments]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Department' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [departments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDepartmentRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Department' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /venues/{venueId}/departments/{id}:
    parameters:
      - name: venueId
        in: path
        required: true
        schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' }
      - { $ref: '#/components/parameters/IdPath' }
    get:
      tags: [departments]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Department' }
    put:
      tags: [departments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDepartmentRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Department' }
    delete:
      tags: [departments]
      responses:
        '204': { description: deleted }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Users ----
  /users:
    get:
      tags: [users]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }

  /users/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [users]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
    put:
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
    delete:
      tags: [users]
      responses:
        '204': { description: deleted }

  # ---- Assets ----
  /assets:
    get:
      tags: [assets]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - { name: venue,        in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: currentVenue, in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: category,     in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: department,   in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: status,       in: query, schema: { $ref: '#/components/schemas/AssetStatus' } }
        - { name: responsible,  in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: away,         in: query, schema: { type: boolean } }
        - { name: overdue,      in: query, schema: { type: boolean } }
        - { name: q,            in: query, schema: { type: string }, description: free-text on name/serialNumber/assetTag }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Asset' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAssetRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }

  /assets/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [assets]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }
    put:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAssetRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }
    delete:
      tags: [assets]
      responses:
        '204': { description: deleted }

  /assets/{id}/history:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [assets]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Movement' }

  /assets/{id}/transfer:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferAssetRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }

  /assets/{id}/status:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StatusChangeRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /assets/{id}/assign:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignCustodyRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }

  /assets/{id}/condition:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConditionUpdate' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /assets/{id}/qr:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [assets]
      responses:
        '200':
          description: QR label
          content:
            image/png: { schema: { type: string, format: binary } }
            application/pdf: { schema: { type: string, format: binary } }

  /assets/qr/bulk:
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkQrRequest' }
      responses:
        '200':
          description: combined PDF of labels
          content:
            application/pdf: { schema: { type: string, format: binary } }

  /assets/bulk/transfer:
    post:
      tags: [assets]
      summary: 'Transfer many assets at once. Validates the whole batch up-front; on any row failure no DB change is made and per-row results are returned.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkTransferRequest' }
      responses:
        '200':
          description: per-row results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BulkActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/status:
    post:
      tags: [assets]
      summary: 'Change status on many assets at once. Same all-or-nothing contract as bulk transfer.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkStatusRequest' }
      responses:
        '200':
          description: per-row results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BulkActionResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/assign:
    post:
      tags: [assets]
      summary: 'Reassign the custodian on many assets at once. Same all-or-nothing contract as bulk transfer: any per-item failure aborts the batch and returns per-row diagnostics. Assets already assigned to the target user are silently skipped as no-ops. Exactly one digest email is enqueued to the new custodian listing all newly assigned assets.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkAssignRequest' }
      responses:
        '200':
          description: batch summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BulkAssignResponse' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/condition/bulk:
    post:
      tags: [assets]
      summary: 'Set condition on many assets at once. BEST-EFFORT: each successful item is its own transaction; unaffected items are reported in skipped[] with a reason (not_found, forbidden, unchanged).'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkConditionUpdate' }
      responses:
        '200':
          description: bulk summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/BulkConditionResult' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /attachments:
    post:
      tags: [assets]
      summary: Upload a file, returns an unlinked attachment ID.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload accepted.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AttachmentUploadResponse' }
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '413':
          description: Payload too large.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /attachments/{id}/download:
    get:
      tags: [assets]
      summary: Stream an attachment. Requires legitimate access to at least one linked asset.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      responses:
        '200':
          description: File bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /scan/{qrToken}:
    parameters: [ { $ref: '#/components/parameters/QrTokenPath' } ]
    get:
      tags: [scan]
      security:
        - bearerAuth: []
      summary: >-
        Resolve a scanned QR code to an asset view. Requires a valid JWT and
        that the caller is authorized for the asset (admin, venue scope on the
        asset's home or current venue, or the asset's current custodian).
        Custodian contact details are shown in full. Resolves for lost/retired.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ScanAssetView' }
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  # ---- Purchase orders ----
  /purchase-orders:
    get:
      tags: [purchase-orders]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - { name: status,      in: query, schema: { $ref: '#/components/schemas/PurchaseOrderStatus' } }
        - { name: responsible, in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PurchaseOrder' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [purchase-orders]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePurchaseOrderRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/PurchaseOrder' }

  /purchase-orders/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [purchase-orders]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/PurchaseOrder' }
    put:
      tags: [purchase-orders]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePurchaseOrderRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/PurchaseOrder' }

  /purchase-orders/{id}/receive:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [purchase-orders]
      summary: Generates one asset per unit per line item in a single Mongo transaction.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReceivePurchaseOrderRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ReceivePurchaseOrderResponse' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Bulk PO import (admin-only; PRD §6.12) ----
  /imports/purchase-orders/template:
    get:
      tags: [purchase-orders]
      summary: Download the CSV import template.
      responses:
        '200':
          description: CSV template
          content:
            text/csv: { schema: { type: string, format: binary } }

  /imports/purchase-orders/validate:
    post:
      tags: [purchase-orders]
      summary: Dry-run a CSV/XLSX upload. Writes ImportJob with status=preview_ready. Creates no POs or assets.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:    { type: string, format: binary }
                options: { type: string, description: 'JSON-encoded ImportJobOptions.' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ImportPreview' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /imports/purchase-orders/commit:
    post:
      tags: [purchase-orders]
      summary: Commit a previously-validated import. Creates POs + assets (one Mongo tx per PO). Notifications suppressed.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CommitImportRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ImportJob' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /imports/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [purchase-orders]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ImportJob' }

  /imports/{id}/report:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [purchase-orders]
      summary: Downloadable CSV report of created POs + assets (with tags) and skipped/errored rows.
      responses:
        '200':
          description: result csv
          content:
