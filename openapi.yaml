    # ============================================================
    # Async bulk-asset jobs
    #
    # All five bulk endpoints return 202 + a BulkJob and execute
    # asynchronously. Enqueue-time validation is synchronous and
    # preserves the pre-async 400 contracts. Whole-job atomicity is
    # relaxed to PER-BATCH atomicity: rows are validated at enqueue,
    # but rows invalidated between enqueue and execution (TOCTOU)
    # become row errors or skips and never abort the job. This mirrors
    # the §6.12 import pipeline's partial-progress contract.
    # ============================================================

    BulkJobType:
      type: string
      description: >-
        transfer/status/assign/condition mutate assets in batched transactions;
        qr renders a combined PDF artifact; ids exports asset _ids matching a
        GET /assets filter set as a JSON artifact.
      enum: [transfer, status, assign, condition, qr, ids]

    BulkJobStatus:
      type: string
      description: >-
        queued (awaiting a worker), running (claimed, batches executing),
        completed (all batches done, zero row errors), completed_with_errors
        (done, some rows failed/skipped-as-error), failed (zero successes or a
        fatal infrastructure error).
      enum: [queued, running, completed, completed_with_errors, failed]

    BulkJobCounts:
      type: object
      required: [total, succeeded, failed, skipped]
      properties:
        total:     { type: integer, description: 'Deduped assetIds enqueued.', x-oapi-codegen-extra-tags: { bson: "total" } }
        succeeded: { type: integer, x-oapi-codegen-extra-tags: { bson: "succeeded" } }
        failed:    { type: integer, x-oapi-codegen-extra-tags: { bson: "failed" } }
        skipped:   { type: integer, description: 'No-op rows (e.g. already-assigned custody, unchanged condition).', x-oapi-codegen-extra-tags: { bson: "skipped" } }

    BulkJobProgress:
      type: object
      required: [batchesTotal, batchesDone]
      properties:
        batchesTotal: { type: integer, x-oapi-codegen-extra-tags: { bson: "batchesTotal" } }
        batchesDone:  { type: integer, description: 'Batches whose transaction has committed. Advances only inside committed batch txns, so it is crash-safe.', x-oapi-codegen-extra-tags: { bson: "batchesDone" } }

    BulkJobRowError:
      type: object
      required: [assetId, code, message]
      properties:
        assetId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: AssetID
          x-oapi-codegen-extra-tags: { bson: "assetId" }
        code:
          type: string
          description: 'Per-row reason, e.g. not_found, forbidden, invalid_transition, dest_venue_forbidden.'
          x-oapi-codegen-extra-tags: { bson: "code" }
        message:
          type: string
          x-oapi-codegen-extra-tags: { bson: "message" }

    BulkJob:
      type: object
      required: [id, type, status, counts, progress, errors, errorsTruncated, requestedBy, createdAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        type:
          allOf: [ { $ref: '#/components/schemas/BulkJobType' } ]
          x-oapi-codegen-extra-tags: { bson: "type" }
        status:
          allOf: [ { $ref: '#/components/schemas/BulkJobStatus' } ]
          x-oapi-codegen-extra-tags: { bson: "status" }
        counts:
          allOf: [ { $ref: '#/components/schemas/BulkJobCounts' } ]
          x-oapi-codegen-extra-tags: { bson: "counts" }
        progress:
          allOf: [ { $ref: '#/components/schemas/BulkJobProgress' } ]
          x-oapi-codegen-extra-tags: { bson: "progress" }
        errors:
          type: array
          description: 'Row-level errors, capped (see errorsTruncated).'
          x-oapi-codegen-extra-tags: { bson: "errors" }
          items: { $ref: '#/components/schemas/BulkJobRowError' }
        errorsTruncated:
          type: boolean
          description: 'True when more row errors occurred than are retained in errors[].'
          x-oapi-codegen-extra-tags: { bson: "errorsTruncated" }
        requestedBy:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          description: 'The enqueuing principal. Authorization is evaluated once, at enqueue; every Movement is stamped performedBy = this principal.'
          x-oapi-codegen-extra-tags: { bson: "requestedBy" }
        createdAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "createdAt" }
        startedAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "startedAt,omitempty" }
        completedAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "completedAt,omitempty" }

    BulkJobList:
      type: object
      required: [jobs]
      properties:
        jobs:
          type: array
          items: { $ref: '#/components/schemas/BulkJob' }

    CreatePurchaseOrderRequest:
      type: object
      required: [poNumber, supplier, responsibleUserId, orderDate, lineItems]
      properties:
        poNumber: { type: string, x-go-name: PONumber }
        supplier: { $ref: '#/components/schemas/PurchaseOrderSupplier' }
        responsibleUserId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ResponsibleUserID
        orderDate: { type: string, format: date-time }
        lineItems:
          type: array
          minItems: 1
          items: { $ref: '#/components/schemas/PurchaseOrderLineItem' }
        attachments: { type: array, items: { type: string } }
        notes: { type: string }

    UpdatePurchaseOrderRequest:
      type: object
      properties:
        poNumber: { type: string, x-go-name: PONumber }
        supplier: { $ref: '#/components/schemas/PurchaseOrderSupplier' }
        responsibleUserId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ResponsibleUserID
        orderDate: { type: string, format: date-time }
        lineItems:
          type: array
          items: { $ref: '#/components/schemas/PurchaseOrderLineItem' }
        attachments: { type: array, items: { type: string } }
        notes: { type: string }
        status: { $ref: '#/components/schemas/PurchaseOrderStatus' }

    ReceivePurchaseOrderRequest:
      type: object
      required: [venueId]
      properties:
        venueId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: VenueID
          description: 'Home venue for every asset generated by this receive.'
        departmentId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: DepartmentID
          description: 'Optional home department for every asset generated by this receive. Must belong to venueId.'

    ReceivePurchaseOrderResponse:
      type: object
      required: [purchaseOrder, generatedAssetIds]
      properties:
        purchaseOrder: { $ref: '#/components/schemas/PurchaseOrder' }
        generatedAssetIds:
          type: array
          x-go-name: GeneratedAssetIDs
          items:
            allOf: [ { $ref: '#/components/schemas/ObjectId' } ]

    CreateRepairRequest:
      type: object
      required: [assetId, issue]
      properties:
        assetId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: AssetID
        issue: { type: string }
        vendor: { type: string }
        notes: { type: string }

    UpdateRepairRequest:
      type: object
      properties:
        status: { $ref: '#/components/schemas/RepairStatus' }
        vendor: { type: string }
        sentAt: { type: string, format: date-time }
        returnedAt: { type: string, format: date-time }
        resolution: { type: string }
        notes: { type: string }

    # ============================================================
    # Dashboard + reports
    # ============================================================

    DashboardVenueCount:
      type: object
      required: [venueId, venueName, count]
      properties:
        venueId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: VenueID
        venueName: { type: string }
        count: { type: integer }

    DashboardSummary:
      type: object
      required: [totalAssets, byStatus, byVenue, awayFromHome, inRepair, overdue]
      properties:
        totalAssets: { type: integer }
        byStatus:
          type: object
          additionalProperties: { type: integer }
        byVenue:
          type: array
          items: { $ref: '#/components/schemas/DashboardVenueCount' }
        awayFromHome: { type: integer }
        inRepair: { type: integer }
        overdue: { type: integer }

    InventoryByVenueRow:
      type: object
      required: [venueId, venueName, total]
      properties:
        venueId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: VenueID
        venueName: { type: string }
        total: { type: integer }
        byStatus:
          type: object
          additionalProperties: { type: integer }
        byDepartment:
          type: array
          items: { $ref: '#/components/schemas/DepartmentAssetCountRow' }

    DepartmentAssetCountRow:
      type: object
      required: [departmentId, departmentName, count]
      properties:
        departmentId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: DepartmentID
        departmentName: { type: string }
        count: { type: integer }

    AssetsByResponsibleRow:
      type: object
      required: [userId, userName, count]
      properties:
        userId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: UserID
        userName: { type: string }
        position: { type: string }
        count: { type: integer }

    # ============================================================
    # Bulk PO import (PRD §6.12)
    # ============================================================

    ImportJobStatus:
      type: string
      enum: [validating, preview_ready, importing, completed, failed, rolled_back]

    ImportConflictPolicy:
      type: string
      enum: [error, skipExisting]

    ImportJobOptions:
      type: object
      properties:
        onConflict:
          allOf: [ { $ref: '#/components/schemas/ImportConflictPolicy' } ]
          description: 'Behaviour when a poNumber already exists. Default: error.'
          x-oapi-codegen-extra-tags: { bson: "onConflict,omitempty" }
        importValidOnly:
          type: boolean
          description: 'If true, commit valid rows and skip errored ones rather than rejecting the whole job.'
          x-oapi-codegen-extra-tags: { bson: "importValidOnly,omitempty" }

    ImportJobCounts:
      type: object
      required: [posTotal, posCreated, assetsCreated, rowsSkipped, rowsErrored]
      properties:
        posTotal:      { type: integer, x-oapi-codegen-extra-tags: { bson: "posTotal" } }
        posCreated:    { type: integer, x-oapi-codegen-extra-tags: { bson: "posCreated" } }
        assetsCreated: { type: integer, x-oapi-codegen-extra-tags: { bson: "assetsCreated" } }
        rowsSkipped:   { type: integer, x-oapi-codegen-extra-tags: { bson: "rowsSkipped" } }
        rowsErrored:   { type: integer, x-oapi-codegen-extra-tags: { bson: "rowsErrored" } }

    ImportRowError:
      type: object
      required: [row, message]
      properties:
        row:     { type: integer, description: '1-based row in the uploaded file (header = 1, first data row = 2).', x-oapi-codegen-extra-tags: { bson: "row" } }
        field:   { type: string, x-oapi-codegen-extra-tags: { bson: "field,omitempty" } }
        message: { type: string, x-oapi-codegen-extra-tags: { bson: "message" } }

    ImportJob:
      type: object
      required: [id, filename, uploadedBy, status, options, counts, errors, createdAt]
      properties:
        id:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ID
          x-oapi-codegen-extra-tags: { bson: "_id,omitempty" }
        filename:
          type: string
          x-oapi-codegen-extra-tags: { bson: "filename" }
        uploadedBy:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-oapi-codegen-extra-tags: { bson: "uploadedBy" }
        status:
          allOf: [ { $ref: '#/components/schemas/ImportJobStatus' } ]
          x-oapi-codegen-extra-tags: { bson: "status" }
        options:
          allOf: [ { $ref: '#/components/schemas/ImportJobOptions' } ]
          x-oapi-codegen-extra-tags: { bson: "options" }
        counts:
          allOf: [ { $ref: '#/components/schemas/ImportJobCounts' } ]
          x-oapi-codegen-extra-tags: { bson: "counts" }
        errors:
          type: array
          x-oapi-codegen-extra-tags: { bson: "errors" }
          items: { $ref: '#/components/schemas/ImportRowError' }
        createdAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "createdAt" }
        completedAt:
          type: string
          format: date-time
          x-oapi-codegen-extra-tags: { bson: "completedAt,omitempty" }

    ImportPreviewPO:
      type: object
      required: [poNumber, lineItems, assetCount]
      properties:
        poNumber:   { type: string }
        lineItems:  { type: integer }
        assetCount: { type: integer }
        categories:
          type: array
          items: { type: string }
        venues:
          type: array
          items: { type: string }
        skipExisting: { type: boolean }

    ImportPreview:
      type: object
      required: [job, posPreview]
      properties:
        job: { $ref: '#/components/schemas/ImportJob' }
        posPreview:
          type: array
          items: { $ref: '#/components/schemas/ImportPreviewPO' }

    CommitImportRequest:
      type: object
      required: [importJobId]
      properties:
        importJobId:
          allOf: [ { $ref: '#/components/schemas/ObjectId' } ]
          x-go-name: ImportJobID
        options:
          allOf: [ { $ref: '#/components/schemas/ImportJobOptions' } ]

security:
  - bearerAuth: []

paths:
  # ---- Auth ----
  /auth/login:
    post:
      tags: [auth]
      security: []
      summary: Email/password login
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /auth/refresh:
    post:
      tags: [auth]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  /auth/me:
    get:
      tags: [auth]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/User' }
        '401': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Venues ----
  /venues:
    get:
      tags: [venues]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Venue' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [venues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVenueRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Venue' }

  /venues/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [venues]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Venue' }
    put:
      tags: [venues]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVenueRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Venue' }
    delete:
      tags: [venues]
      responses:
        '204': { description: deleted }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Categories ----
  /categories:
    get:
      tags: [categories]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Category' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCategoryRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }

  /categories/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [categories]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }
    put:
      tags: [categories]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCategoryRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Category' }
    delete:
      tags: [categories]
      responses:
        '204': { description: deleted }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Departments (nested under venues) ----
  /venues/{venueId}/departments:
    parameters:
      - name: venueId
        in: path
        required: true
        schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' }
    get:
      tags: [departments]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Department' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [departments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDepartmentRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Department' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /venues/{venueId}/departments/{id}:
    parameters:
      - name: venueId
        in: path
        required: true
        schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' }
      - { $ref: '#/components/parameters/IdPath' }
    get:
      tags: [departments]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Department' }
    put:
      tags: [departments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDepartmentRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Department' }
    delete:
      tags: [departments]
      responses:
        '204': { description: deleted }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  # ---- Users ----
  /users:
    get:
      tags: [users]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }

  /users/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [users]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
    put:
      tags: [users]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/User' }
    delete:
      tags: [users]
      responses:
        '204': { description: deleted }

  # ---- Assets ----
  /assets:
    get:
      tags: [assets]
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/LimitParam'
        - { name: venue,        in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: currentVenue, in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: category,     in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: department,   in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: status,       in: query, schema: { $ref: '#/components/schemas/AssetStatus' } }
        - { name: responsible,  in: query, schema: { type: string, pattern: '^[0-9a-fA-F]{24}$' } }
        - { name: away,         in: query, schema: { type: boolean } }
        - { name: overdue,      in: query, schema: { type: boolean } }
        - { name: q,            in: query, schema: { type: string }, description: free-text on name/serialNumber/assetTag }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Asset' }
                  meta: { $ref: '#/components/schemas/Meta' }
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAssetRequest' }
      responses:
        '201':
          description: created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }

  /assets/{id}:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [assets]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }
    put:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateAssetRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }
    delete:
      tags: [assets]
      responses:
        '204': { description: deleted }

  /assets/{id}/history:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [assets]
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Movement' }

  /assets/{id}/transfer:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TransferAssetRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }

  /assets/{id}/status:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/StatusChangeRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /assets/{id}/assign:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AssignCustodyRequest' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }

  /assets/{id}/condition:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    post:
      tags: [assets]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ConditionUpdate' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/Asset' }
        '409': { $ref: '#/components/responses/ErrorResponse' }

  /assets/{id}/qr:
    parameters: [ { $ref: '#/components/parameters/IdPath' } ]
    get:
      tags: [assets]
      responses:
        '200':
          description: QR label
          content:
            image/png: { schema: { type: string, format: binary } }
            application/pdf: { schema: { type: string, format: binary } }

  /assets/qr/bulk:
    post:
      tags: [assets]
      summary: 'Enqueue an async job that renders a combined PDF of QR labels. Validates existence + per-asset RBAC synchronously, then returns 202 + a BulkJob. Poll GET /assets/bulk/jobs/{jobId}; fetch the PDF from GET /assets/bulk/jobs/{jobId}/result once completed.'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkQrRequest' }
      responses:
        '202':
          description: 'Job accepted. Poll the returned BulkJob for status; the PDF is served from the /result sub-resource.'
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/BulkJob' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/ids:
    post:
      tags: [assets]
      summary: 'Enqueue an async job that exports asset ids matching a GET /assets filter set.'
      description: >-
        Collects asset _ids ONLY (no documents) matching the exact same filter
        set as GET /assets — including venue scoping, so a manager/staff can only
        ever export ids of assets they could see in the list. Deliberately routed
        under /assets/bulk/ (not /assets/ids) to avoid colliding with the
        /assets/:id param route. Enqueue-time validation is synchronous (400):
        malformed ObjectId filters use the same per-field errors as GET /assets,
        and limit must be 1..ASSET_IDS_MAX_LIMIT (optional, defaults to the cap).
        Returns 202 + a BulkJob; poll GET /assets/bulk/jobs/{jobId} and download
        the JSON artifact from GET /assets/bulk/jobs/{jobId}/result once
        completed. The scan is keyset-paginated and read-only; ids are
        descending by createdAt (newest first, following the GET /assets list
        sort) as observed during the scan (not a point-in-time snapshot).
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkIdsRequest' }
      responses:
        '202':
          description: 'Job accepted. Poll the returned BulkJob; the JSON artifact is served from the /result sub-resource.'
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/BulkJob' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/transfer:
    post:
      tags: [assets]
      summary: 'Enqueue an async transfer of many assets.'
      description: >-
        Validates the whole batch synchronously (existence + active, per-asset
        RBAC, target venue exists/active, attachments) and, on any row failure
        (unless validOnly=true), returns the pre-async 400 contract with no
        DB change. On success returns 202 + a BulkJob and executes
        asynchronously in per-batch transactions. Whole-job atomicity is
        relaxed to PER-BATCH atomicity: rows invalidated between enqueue and
        execution become row errors, not a whole-job abort. Every Movement is
        stamped performedBy = the enqueuing principal and performedAt = batch
        execution time. On completion, one transfer digest is enqueued per
        home-venue manager covering the assets that actually moved.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkTransferRequest' }
      responses:
        '202':
          description: job accepted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/BulkJob' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/status:
    post:
      tags: [assets]
      summary: 'Enqueue an async status change on many assets.'
      description: >-
        Validates existence, per-asset RBAC, §5 transition validity per row and
        attachments synchronously; on any row failure (unless validOnly=true)
        returns the pre-async 400 contract with no DB change. On success returns
        202 + a BulkJob. The state machine is re-validated inside each batch
        transaction against the asset's then-current status, so a transition
        invalidated after enqueue becomes a row error (job ends
        completed_with_errors). No notifications. Per-batch atomicity applies.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkStatusRequest' }
      responses:
        '202':
          description: job accepted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/BulkJob' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/assign:
    post:
      tags: [assets]
      summary: 'Enqueue an async custody reassignment on many assets.'
      description: >-
        Validates existence, per-asset RBAC and attachments synchronously; an
        unknown or inactive responsibleUserId is always a whole-request 400
        (regardless of validOnly). Assets already assigned to the target user
        are pre-counted as skipped. On success returns 202 + a BulkJob. Inside
        each batch transaction the custodian is re-read: still-assigned rows are
        skipped with NO Movement written. On completion, exactly one custody
        digest is enqueued to the new custodian listing all newly assigned
        assets — even across many batches. Per-batch atomicity applies.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkAssignRequest' }
      responses:
        '202':
          description: job accepted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/BulkJob' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/condition/bulk:
    post:
      tags: [assets]
      summary: 'Enqueue an async condition change on many assets (best-effort).'
      description: >-
        Validates the payload + attachments synchronously (enqueue succeeds if
        the request itself is valid) and returns 202 + a BulkJob. Best-effort by
        design: per-row no-op / not-found / forbidden outcomes increment skip
        counters (not errors), preserving the pre-async silent-skip behaviour,
        now visible in the job counts. No notifications. Per-batch atomicity
        applies.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/BulkConditionUpdate' }
      responses:
        '202':
          description: job accepted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/BulkJob' }
        '400': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/jobs:
    get:
      tags: [assets]
      summary: 'List bulk-asset jobs (admin only).'
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema: { $ref: '#/components/schemas/BulkJobStatus' }
        - name: type
          in: query
          required: false
          schema: { $ref: '#/components/schemas/BulkJobType' }
      responses:
        '200':
          description: matching jobs
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/BulkJobList' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/jobs/{jobId}:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/ObjectId' }
    get:
      tags: [assets]
      summary: 'Fetch a bulk-asset job status. RBAC: the requesting principal or an admin.'
      security:
        - bearerAuth: []
      responses:
        '200':
          description: job status
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/BulkJob' }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }

  /assets/bulk/jobs/{jobId}/result:
    parameters:
      - name: jobId
        in: path
        required: true
        schema: { $ref: '#/components/schemas/ObjectId' }
    get:
      tags: [assets]
      summary: 'Stream a completed job artifact: the QR PDF (qr jobs) or the asset-ids JSON (ids jobs).'
      description: >-
        RBAC: the requesting principal or an admin. Returns 404 while the job is
        not yet completed or if the job type has no downloadable artifact. For a
        qr job the body is application/pdf; for an ids job it is application/json
        matching AssetIdsResult. After the retention window (BULK_RESULT_TTL_DAYS)
        the artifact is deleted and this endpoint returns 410 Gone.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 'The job artifact (PDF for qr jobs, JSON for ids jobs).'
          content:
            application/pdf: { schema: { type: string, format: binary } }
            application/json: { schema: { $ref: '#/components/schemas/AssetIdsResult' } }
        '401': { $ref: '#/components/responses/ErrorResponse' }
        '403': { $ref: '#/components/responses/ErrorResponse' }
        '404': { $ref: '#/components/responses/ErrorResponse' }
        '410': { $ref: '#/components/responses/ErrorResponse' }

  /attachments:
    post:
      tags: [assets]
      summary: Upload a file, returns an unlinked attachment ID.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
      responses:
        '200':
          description: Upload accepted.
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/AttachmentUploadResponse' }
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '413':
          description: Payload too large.
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorEnvelope' }

  /attachments/{id}/download:
    get:
      tags: [assets]
      summary: Stream an attachment. Requires legitimate access to at least one linked asset.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { $ref: '#/components/schemas/ObjectId' }
      responses:
        '200':
          description: File bytes.
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

  /scan/{qrToken}:
    parameters: [ { $ref: '#/components/parameters/QrTokenPath' } ]
    get:
      tags: [scan]
      security:
        - bearerAuth: []
      summary: >-
        Resolve a scanned QR code to an asset view. Requires a valid JWT and
        that the caller is authorized for the asset (admin, venue scope on the
        asset's home or current venue, or the asset's current custodian).
        Custodian contact details are shown in full. Resolves for lost/retired.
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: '#/components/schemas/ScanAssetView' }
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

